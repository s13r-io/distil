name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check distil tests

      - name: Unit tests
        # Hermetic: no ANTHROPIC_API_KEY, so eval tests are skipped (see tests/conftest.py).
        run: pytest tests/unit -m "not eval"

  eval:
    name: Eval suite (LLM behaviour, gated)
    runs-on: ubuntu-latest
    # Runs only on manual dispatch or when the key secret is present (TESTING.md §4).
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,anthropic,embed-local,vec]"
      - name: Eval tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISTIL_MODEL: ${{ secrets.DISTIL_MODEL }}
        run: pytest -m eval
