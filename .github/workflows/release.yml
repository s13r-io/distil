name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install + unit tests (gate the release on green)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check distil web tests
          pytest tests/unit -m "not eval"

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
