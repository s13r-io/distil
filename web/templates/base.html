<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}Distil{% endblock %}</title>
  <link rel="stylesheet" href="/static/distil.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a href="/" class="brand"><span class="brand-mark">D</span><span>Distil</span></a>
      <div class="topbar-actions">
        <a href="/" class="{% if active_page == 'ask' %}active{% endif %}">Ask</a>
        <a href="/library" class="{% if active_page == 'library' %}active{% endif %}">Library</a>
        <a href="/logout">Sign out</a>
      </div>
    </div>
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
